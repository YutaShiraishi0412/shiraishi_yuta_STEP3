<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>世界一甘いお店</title>
    <link rel="stylesheet" href="test.css">
</head>
<body>

<div class="container">

    <div class="header">
        <h2>世界一甘いお店</h2>
    </div>

    <div class="content">

        <div class="sidebar">
            <ul>
                <li><a href="https://www.google.com">トップ</a></li>
                <li><a href="https://www.yahoo.co.jp">新着情報</a></li>
                <li><a href="https://www.bing.com">おすすめのスイーツ</a></li>
                <li><a href="#">お問い合わせ</a></li>
            </ul>
        </div>

        <div class="main">
            <form>
                <table>
                    <tr>
                        <th>お名前</th>
                        <td><input type="text" size="40"></td>
                    </tr>
                    <tr>
                        <th>お近くのお店</th>
                        <td>
                            <select>
                                <option>北海道・東北</option>
                                <option>関東</option>
                                <option>中部</option>
                                <option>関西</option>
                                <option>中国・四国</option>
                                <option>九州・沖縄</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <th>電話</th>
                        <td><input type="text" size="40"></td>
                    </tr>
                    <tr>
                        <th>メールアドレス</th>
                        <td><input type="text" size="40"></td>
                    </tr>
                    <tr>
                        <th>お問い合わせ種別</th>
                        <td>
                            <input type="radio" name="type"> 商品について
                            <input type="radio" name="type"> 従業員について
                        </td>
                    </tr>
                    <tr>
                        <th>お問い合わせ内容</th>
                        <td>
                            <textarea cols="30" rows="5"></textarea>
                        </td>
                    </tr>
                </table>
                <br>
                <input type="submit" value="送信">
            </form>
        </div>

    </div>

    <div class="footer">
        © 2026 世界一甘いお店
    </div>

</div>

</body>
</html>
